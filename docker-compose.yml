version: '3.9'

services:
    db:
      image: mysql:8
      container_name: barber_mysql
      restart: always
      environment:
       MYSQL_ROOT_PASSWORD: root1234
       MYSQL_DATABASE: barber_db
      ports:
      - "3307:3306"
      volumes:
      - mysql_data:/var/lib/mysql
volumes:
    mysql_data:

